name: Keep backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.BACKEND_URL }}"
          if [ -z "$URL" ]; then
            echo "Set a repository variable named BACKEND_URL (e.g. https://mediqueue-api.onrender.com). Skipping."
            exit 0
          fi
          echo "Pinging ${URL}/api/health"
          curl -fsS --max-time 90 "${URL}/api/health" && echo "" && echo "ok"
