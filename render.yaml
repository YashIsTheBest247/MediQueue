services:
  - type: web
    name: mediqueue-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: mediqueue-db
          property: connectionString
      - key: MEDIQUEUE_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MEDIQUEUE_ADMIN_KEY
        sync: false
      - key: MEDIQUEUE_SMTP_HOST
        sync: false
      - key: MEDIQUEUE_SMTP_PORT
        value: "587"
      - key: MEDIQUEUE_SMTP_USER
        sync: false
      - key: MEDIQUEUE_SMTP_PASS
        sync: false
      - key: MEDIQUEUE_SMTP_SSL
        value: "false"
      - key: MEDIQUEUE_MAIL_FROM
        sync: false

databases:
  - name: mediqueue-db
    plan: free
    databaseName: mediqueue
    user: mediqueue
